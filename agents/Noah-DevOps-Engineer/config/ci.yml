name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system & Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project deps if a requirements.txt exists (don't fail if missing)
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Ensure test runner deps required by Dana's tests
          pip install pytest requests
      - name: Run pytest (rate-limit integration tests)
        run: |
          python -m pytest output/tests/test_rate_limit.py -q
      - name: Lint with ruff
        run: |
          python -m pip install ruff
          ruff check src/ || true

  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t app .
